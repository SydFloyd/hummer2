<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hummer Audio-to-MIDI Lab</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/hummer_logo_32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <img src="assets/hummer_logo.png" alt="Hummer logo" class="logo">
      <div>
        <h1>Audio-to-MIDI Lab</h1>
        <p>Record a hum, inspect signal features, and audition derived pitch tracks.</p>
      </div>
    </header>

    <section class="panel controls">
      <div class="button-row">
        <button id="startBtn" class="transport-symbol-btn" type="button" aria-label="Start recording" title="Start recording">&#x25cf;</button>
        <button id="stopBtn" class="transport-symbol-btn" type="button" aria-label="Stop recording or playback" title="Stop recording or playback" disabled>&#x25a0;</button>
        <button id="loopToggleBtn" class="icon-toggle icon-loop" type="button" aria-label="Toggle loop playback" title="Loop playback">&#x21bb;</button>
        <button id="playSelectedBtn" class="transport-symbol-btn" type="button" aria-label="Play selected mode" title="Play selected mode" disabled>&#x25b6;</button>
        <div class="play-mode-group" role="radiogroup" aria-label="Playback mode">
          <label class="play-mode-option">
            <input type="radio" name="playMode" value="raw" checked>
            Raw
          </label>
          <label class="play-mode-option">
            <input type="radio" name="playMode" value="auto">
            Autotuned
          </label>
          <label class="play-mode-option">
            <input type="radio" name="playMode" value="original">
            Original
          </label>
        </div>
        <div class="preset-inline">
          <label class="preset-label" for="presetSelect">Presets</label>
          <select id="presetSelect" aria-label="Shared presets"></select>
        </div>
        <button id="resetDefaultsBtn" class="reset-btn" type="button" aria-label="Reset defaults" title="Reset defaults">Reset</button>
        <button
          id="toggleControlsBtn"
          class="icon-toggle"
          type="button"
          aria-label="Expand settings"
          aria-controls="selectionPanel"
          aria-expanded="false"
          title="Expand settings"
        >&#x25b8;</button>
      </div>

      <div id="selectionPanel" class="selection-panel" hidden>
        <div class="control-grid">
          <label>
            Voicing Strictness
            <input id="gateMultiplier" type="range" min="1.2" max="6" step="0.1" value="2.5">
            <span id="gateMultiplierValue">2.5</span>
          </label>
          <label>
            Min Note Length (ms)
            <input id="minNoteMs" type="range" min="20" max="300" step="5" value="20">
            <span id="minNoteMsValue">20</span>
          </label>
          <label>
            Target Stability
            <input id="pitchJumpSplit" type="range" min="0" max="6" step="0.1" value="1.2">
            <span id="pitchJumpSplitValue">1.2</span>
          </label>
          <label>
            Max Note Jump (st)
            <input id="maxNoteJump" type="range" min="0" max="24" step="0.5" value="12">
            <span id="maxNoteJumpValue">12.0</span>
          </label>
          <label>
            Note Derivation
            <select id="noteDerivation">
              <option value="mean" selected>Mean</option>
              <option value="median">Median</option>
              <option value="tailWeightedMean">Tail-Weighted Mean</option>
            </select>
          </label>
        </div>

        <div class="pitch-frontend-grid">
          <label>
            Pitch Front End
            <select id="pitchFrontendModel">
              <option value="tiny" selected>TorchCREPE Tiny</option>
              <option value="full">TorchCREPE Full</option>
            </select>
          </label>
          <label>
            Periodicity Floor
            <input id="periodicityFloor" type="range" min="0" max="1" step="0.01" value="0.28">
            <span id="periodicityFloorValue">0.28</span>
          </label>
          <label>
            Onset Sensitivity
            <input id="onsetSensitivity" type="range" min="0" max="1" step="0.01" value="0.55">
            <span id="onsetSensitivityValue">0.55</span>
          </label>
          <label>
            Stability Sensitivity
            <input id="stabilitySensitivity" type="range" min="0" max="1" step="0.01" value="0.58">
            <span id="stabilitySensitivityValue">0.58</span>
          </label>
          <label class="inline pitch-frontend-toggle">
            <input id="pitchUseViterbi" type="checkbox" checked>
            Use Viterbi Decode
          </label>
        </div>

        <div class="scale-control-row">
          <label>
            Scale Root
            <select id="scaleRoot"></select>
          </label>
          <label>
            Scale Mode
            <select id="scaleMode"></select>
          </label>
          <button id="playScaleBtn">Play Scale</button>
        </div>

        <div class="raw-playback-row">
          <label class="inline playback-toggle raw-playback-toggle">
            <input id="rawPortamentoEnabled" type="checkbox">
            Raw Portamento
          </label>
          <label class="raw-playback-slider">
            Raw Portamento Amount
            <input id="rawPortamentoAmount" type="range" min="0" max="100" step="1" value="35">
            <span id="rawPortamentoAmountValue">35%</span>
          </label>
          <label class="inline playback-toggle raw-playback-toggle">
            <input id="rawGravityEnabled" type="checkbox">
            Raw Scale Gravity
          </label>
          <label class="raw-playback-slider">
            Raw Gravity Amount
            <input id="rawGravityAmount" type="range" min="0" max="100" step="1" value="100">
            <span id="rawGravityAmountValue">100%</span>
          </label>
        </div>
      </div>

      <div class="synth-panel">
        <div class="synth-panel-header">
          <h3 class="synth-panel-title">Playback Synth</h3>
          <button
            id="toggleSynthPanelBtn"
            class="icon-toggle icon-toggle-secondary"
            type="button"
            aria-label="Expand synth settings"
            aria-controls="synthSelectionPanel"
            aria-expanded="false"
            title="Expand synth settings"
          >&#x25b8;</button>
        </div>

        <div id="synthSelectionPanel" class="synth-selection-panel" hidden>
          <div class="synth-row-grid synth-row-voice">
            <label>
              Oscillator
              <select id="synthOscillator">
                <option value="sawtooth" selected>Sawtooth</option>
                <option value="square">Square</option>
                <option value="triangle">Triangle</option>
                <option value="sine">Sine</option>
              </select>
            </label>
            <label>
              Voice 2 Detune (cents)
              <input id="synthVoice2Detune" type="range" min="-40" max="40" step="1" value="8">
              <span id="synthVoice2DetuneValue">+8</span>
            </label>
            <label>
              Voice 2 Mix
              <input id="synthVoice2Mix" type="range" min="0" max="100" step="1" value="38">
              <span id="synthVoice2MixValue">38%</span>
            </label>
            <label class="inline synth-voice2-toggle synth-inline-end">
              <input id="synthVoice2Enabled" type="checkbox" checked>
              Enable Voice 2
            </label>
          </div>

          <div class="synth-row-divider"></div>

          <div class="synth-row-grid synth-row-filter">
            <label>
              Filter Type
              <select id="synthFilterType">
                <option value="none">None</option>
                <option value="lowpass" selected>Lowpass</option>
                <option value="bandpass">Bandpass</option>
                <option value="highpass">Highpass</option>
              </select>
            </label>
            <label>
              Filter Q
              <input id="synthFilterQ" type="range" min="0.1" max="16" step="0.1" value="0.8">
              <span id="synthFilterQValue">0.8</span>
            </label>
            <label>
              Filter Cutoff (Hz)
              <input id="synthFilterCutoff" type="range" min="250" max="7000" step="25" value="3200">
              <span id="synthFilterCutoffValue">3200 Hz</span>
            </label>
            <label>
              Keyboard Tracking
              <input id="synthKeyboardTrackingPct" type="range" min="0" max="100" step="1" value="45">
              <span id="synthKeyboardTrackingPctValue">45%</span>
            </label>
            <label>
              Filter Env Depth
              <input id="synthFilterEnvDepth" type="range" min="0" max="2.5" step="0.05" value="1.1">
              <span id="synthFilterEnvDepthValue">1.10 oct</span>
            </label>
          </div>

          <div class="synth-row-grid synth-row-envelope">
            <label>
              Filter Attack (ms)
              <input id="synthAttackMs" type="range" min="1" max="300" step="1" value="14">
              <span id="synthAttackMsValue">14</span>
            </label>
            <label>
              Filter Decay (ms)
              <input id="synthDecayMs" type="range" min="5" max="900" step="5" value="160">
              <span id="synthDecayMsValue">160</span>
            </label>
            <label>
              Filter Sustain (%)
              <input id="synthSustainPct" type="range" min="0" max="100" step="1" value="72">
              <span id="synthSustainPctValue">72%</span>
            </label>
            <label>
              Filter Release (ms)
              <input id="synthReleaseMs" type="range" min="10" max="1200" step="5" value="170">
              <span id="synthReleaseMsValue">170</span>
            </label>
          </div>

          <div class="synth-row-divider"></div>

          <div class="synth-row-grid synth-row-amp-envelope">
            <label>
              Amp Attack (ms)
              <input id="ampAttackMs" type="range" min="1" max="300" step="1" value="8">
              <span id="ampAttackMsValue">8</span>
            </label>
            <label>
              Amp Decay (ms)
              <input id="ampDecayMs" type="range" min="5" max="900" step="5" value="120">
              <span id="ampDecayMsValue">120</span>
            </label>
            <label>
              Amp Sustain (%)
              <input id="ampSustainPct" type="range" min="0" max="100" step="1" value="92">
              <span id="ampSustainPctValue">92%</span>
            </label>
            <label>
              Amp Release (ms)
              <input id="ampReleaseMs" type="range" min="10" max="1200" step="5" value="130">
              <span id="ampReleaseMsValue">130</span>
            </label>
          </div>

          <div class="synth-row-grid synth-row-dynamics">
            <label class="inline playback-toggle synth-inline-end">
              <input id="continuousDynamics" type="checkbox" checked>
              Follow Original Amplitude
            </label>
            <label>
              Output Gain
              <input id="synthOutputGain" type="range" min="10" max="100" step="1" value="55">
              <span id="synthOutputGainValue">55%</span>
            </label>
            <button id="synthTestBtn" type="button" title="Hold to test ADSR with middle C">test</button>
          </div>
        </div>
      </div>
    </section>

    <section class="panel viz-panel">
      <h2>Derived MIDI Timeline</h2>
      <canvas id="midiCanvas" width="1200" height="260"></canvas>
    </section>

    <section class="panel status-panel">
      <div id="statusText">Idle</div>
      <div class="stats">
        <span>Duration: <strong id="durationValue">-</strong></span>
        <span>Noise Floor RMS: <strong id="noiseFloorValue">-</strong></span>
        <span>Gate Reference RMS: <strong id="thresholdValue">-</strong></span>
        <span>Scale: <strong id="scaleInfoValue">Auto</strong></span>
      </div>
    </section>

    <section class="panel viz-panel">
      <h2>Waveform + RMS Envelope</h2>
      <canvas id="waveCanvas" width="1200" height="156"></canvas>
    </section>

    <section class="panel viz-panel">
      <h2>Spectrogram + Pitch Track</h2>
      <canvas id="specCanvas" width="1200" height="340"></canvas>
    </section>

    <footer class="app-footer">
      <span>Repository: <a class="repo-link" href="https://github.com/SydFloyd/hummer2" target="_blank" rel="noopener noreferrer">github.com/SydFloyd/hummer2</a></span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
